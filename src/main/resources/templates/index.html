<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PixelForge MathEngine 2D</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        header {
            background-color: #172554;
            color: white;
            padding: 24px;
            text-align: center;
        }

        main {
            width: 90%;
            max-width: 1100px;
            margin: 30px auto;
        }

        .panel {
            background-color: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
        }

        .estado {
            padding: 12px;
            background-color: #dcfce7;
            border: 1px solid #22c55e;
            border-radius: 6px;
            color: #166534;
        }
    </style>
</head>

<body>

<header>
    <h1>PixelForge MathEngine 2D v1.0</h1>
    <p>Motor matemático para transformaciones geométricas</p>
</header>

<main>
    <section class="panel">
        <h2>Estado del sistema</h2>

        <div class="estado">
            Spring Boot y Thymeleaf están funcionando correctamente.
        </div>
    </section>
</main>

</body>
</html>
